                - generic [ref=e237]:
                  - paragraph
                  - generic [ref=e238]:
                    - generic [ref=e239]:
                      - heading "Abstract" [level=2] [ref=e240]
                      - text: To equip computers with human communication skills and to enable natural interaction between the computer and a human, intelligent solutions are required based on artificial intelligence (AI) methods, algorithms, and sensor technology. This study aimed at identifying and analyzing the state-of-the-art AI methods and algorithms and sensors technology in existing human–computer intelligent interaction (HCII) research to explore trends in HCII research, categorize existing evidence, and identify potential directions for future research. We conduct a systematic mapping study of the HCII body of research. Four hundred fifty-four studies published in various journals and conferences between 2010 and 2021 were identified and analyzed. Studies in the HCII and IUI fields have primarily been focused on intelligent recognition of emotion, gestures, and facial expressions using sensors technology, such as the camera, EEG, Kinect, wearable sensors, eye tracker, gyroscope, and others. Researchers most often apply deep-learning and instance-based AI methods and algorithms. The support sector machine (SVM) is the most widely used algorithm for various kinds of recognition, primarily an emotion, facial expression, and gesture. The convolutional neural network (CNN) is the often-used deep-learning algorithm for emotion recognition, facial recognition, and gesture recognition solutions.
                    - generic [ref=e242]:
                      - text: "Keywords:"
                      - link "human–computer intelligent interaction" [ref=e243] [cursor=pointer]:
                        - /url: /search?q=human%E2%80%93computer+intelligent+interaction
                      - text: ;
                      - link "intelligent user interfaces" [ref=e244] [cursor=pointer]:
                        - /url: /search?q=intelligent+user+interfaces
                      - text: ;
                      - link "IUI" [ref=e245] [cursor=pointer]:
                        - /url: /search?q=IUI
                      - text: ;
                      - link "sensors" [ref=e246] [cursor=pointer]:
                        - /url: /search?q=sensors
                      - text: ;
                      - link "artificial intelligence" [ref=e247] [cursor=pointer]:
                        - /url: /search?q=artificial+intelligence
                  - paragraph
                - generic [ref=e248]:
                  - generic [ref=e249]:
                    - generic [ref=e250]:
                      - heading "1. Introduction" [level=2] [ref=e251]
                      - generic [ref=e252]:
                        - text: Human–computer interaction (HCI) is a research area related to people’s design and use of technology and computers [
                        - link "1" [ref=e253] [cursor=pointer]:
                          - /url: "#B1-sensors-22-00020"
                        - text: "]. With the rapid development of modern information and communication technologies the role and purpose of computers has significantly changed. Today, computers have become indispensable for everyday learning, job, social, and life activities. Regardless of the type of device (e.g., a desktop computer, a laptop, a smartphone, etc.), the computer programs need to provide user interfaces (UIs) with an efficient HCI, enabling efficient completion of various tasks, such as typing a document, driving a car, controlling a robot arm, searching information online, listening to music, and others. By the massive infusion of technologies in today’s society and their ubiquitous usage in our daily-life activities, the HCI has become one of the most exciting research topics in recent years ["
                        - link "2" [ref=e254] [cursor=pointer]:
                          - /url: "#B2-sensors-22-00020"
                        - text: "]. The appeal for useful HCI technologies has led numerous researchers to develop innovative and intelligent methods to make HCI attractive to users ["
                        - link "3" [ref=e255] [cursor=pointer]:
                          - /url: "#B3-sensors-22-00020"
                        - text: "]."
                      - generic [ref=e256]:
                        - text: In recent years, we have been witnessing a growing need for intelligent user interfaces (IUIs) that can meet user criteria where the user’s expectation towards the technology increases day-by-day [
                        - link "4" [ref=e257] [cursor=pointer]:
                          - /url: "#B4-sensors-22-00020"
                        - text: "]. Next-generation computing has made it possible to develop anticipatory human-centered UIs built for humans on naturally occurring multimodal human communication, which is able to understand and emulate human communicative intentions as expressed through behavioral cues, such as effective and social signals ["
                        - link "5" [ref=e258] [cursor=pointer]:
                          - /url: "#B5-sensors-22-00020"
                        - text: "]. The vision of developing IUI emerged with the creation of the first computers ["
                        - link "6" [ref=e259] [cursor=pointer]:
                          - /url: "#B6-sensors-22-00020"
                        - text: "] and has been evolving ever since, with the development of UI enabling different types of interaction with software systems, as well as with the evolution of artificial intelligence (AI) and adaptation mechanisms ["
                        - link "7" [ref=e260] [cursor=pointer]:
                          - /url: "#B7-sensors-22-00020"
                        - text: "]. IUI provides many benefits to the users, including adaptivity, context-sensitivity, task assistance, and enhanced user-interaction through comprehended input, generated multimodal presentation, semi- or fully automated completion of tasks, and managed interaction by representing, reasoning, and exploiting models of user, domain, task, and context ["
                        - link "6" [ref=e261] [cursor=pointer]:
                          - /url: "#B6-sensors-22-00020"
                        - text: "]. The rapid development of Internet of Things (IoT) technologies has spurred the development of devices and sensors that surround the users and provide valuable information about users’ actions, behavior, interests, and preferences. AI machine-learning methods and algorithms can leverage such information to develop IUIs, providing increased productivity, improved efficiency, effectiveness, and naturalness of interaction."
                      - generic [ref=e262]:
                        - text: The IUI field is multi-disciplinary, interchanging the ideas from different areas, such as HCI, ergonomics, cognitive science (CS), and AI, with its subfields such as vision, speech and language processing, knowledge representation and reasoning, machine learning/knowledge discovery, planning and agent-modeling, and user and discourse modeling [
                        - link "6" [ref=e263] [cursor=pointer]:
                          - /url: "#B6-sensors-22-00020"
                        - text: ","
                        - link "8" [ref=e264] [cursor=pointer]:
                          - /url: "#B8-sensors-22-00020"
                        - text: "]. The need for intelligence in UIs has also driven the research and development of new AI methods and algorithms, enabling the development of human–computer intelligent interactions (HCII) and IUIs. The data generated during the user’s interaction with the computer through intelligent sensing technology can be processed with AI to recognize HCI patterns that can be used to adjust the UI according to individual needs, preferences, and styles of using the UI. The main objective of this study is to identify and systematically map the research in the field of HCII and IUI. The insights might provide an overview of trends in which HCII and IUI are studied concerning the ongoing discussion about the use of sensing technology and AI methods and algorithms used in developing HCII and IUI. In existing HCI- and IUI-related research, systematic literature reviews and systematic mapping studies have investigated, for example, design approaches in human-centric IT systems ["
                        - link "9" [ref=e265] [cursor=pointer]:
                          - /url: "#B9-sensors-22-00020"
                        - text: "], the meaning of the term “intelligent” in the HCI community ["
                        - link "10" [ref=e266] [cursor=pointer]:
                          - /url: "#B10-sensors-22-00020"
                        - text: "], understanding of research status of interaction design in HCI ["
                        - link "11" [ref=e267] [cursor=pointer]:
                          - /url: "#B11-sensors-22-00020"
                        - text: "], the thematic evolution of the HCI and related fields in CHI conference community ["
                        - link "12" [ref=e268] [cursor=pointer]:
                          - /url: "#B12-sensors-22-00020"
                        - text: "], the design trends of IUIs in the context of contemporary software systems ["
                        - link "7" [ref=e269] [cursor=pointer]:
                          - /url: "#B7-sensors-22-00020"
                        - text: "], applications IUIs with emphasis on ambient-assisted living technologies ["
                        - link "13" [ref=e270] [cursor=pointer]:
                          - /url: "#B13-sensors-22-00020"
                        - text: "], affective computing methods and techniques ["
                        - link "14" [ref=e271] [cursor=pointer]:
                          - /url: "#B14-sensors-22-00020"
                        - text: "], deep-learning methods for EMG-based human–machine interaction ["
                        - link "15" [ref=e272] [cursor=pointer]:
                          - /url: "#B15-sensors-22-00020"
                        - text: "], emotion recognition using EEG signals ["
                        - link "16" [ref=e273] [cursor=pointer]:
                          - /url: "#B16-sensors-22-00020"
                        - text: "], applications of AI in smart home solutions ["
                        - link "17" [ref=e274] [cursor=pointer]:
                          - /url: "#B17-sensors-22-00020"
                        - text: "], deep-learning techniques for speech emotion recognition ["
                        - link "18" [ref=e275] [cursor=pointer]:
                          - /url: "#B18-sensors-22-00020"
                        - text: "], and mobile sensing and emotion recognition via smartphone sensors ["
                        - link "19" [ref=e276] [cursor=pointer]:
                          - /url: "#B19-sensors-22-00020"
                        - text: ","
                        - link "20" [ref=e277] [cursor=pointer]:
                          - /url: "#B20-sensors-22-00020"
                        - text: ","
                        - link "21" [ref=e278] [cursor=pointer]:
                          - /url: "#B21-sensors-22-00020"
                        - text: "]. However, to our best knowledge, this study is one of the first to provide a systematic review and mapping of existing research published in the last decade in the field of HCII, focusing on sensing technology and AI methods and algorithms to develop IUI. This paper can enable both HCI researchers and AI researchers gain wider and deeper insight into HCII research in the last decade, facilitating relevant researchers to have a general understanding of novel sensing technology and AI methods and algorithms used in HCII development and find future research directions."
                    - generic [ref=e279]:
                      - heading "2. Backgrounds and Related Work" [level=2] [ref=e280]
                      - generic [ref=e281]:
                        - heading "2.1. Human–Computer Intelligent Interaction (HCII)" [level=3] [ref=e282]
                        - generic [ref=e283]:
                          - text: HCI is “a discipline concerned with the design, evaluation, and implementation of interactive computing systems for human use and with the study of major phenomena surrounding them” [
                          - link "22" [ref=e284] [cursor=pointer]:
                            - /url: "#B22-sensors-22-00020"
                          - text: "]. HCI is an interdisciplinary discipline grounded initially on computer science, psychology, and ergonomics and disciplines that joined later, for example, social science, cognitive science, etc. ["
                          - link "23" [ref=e285] [cursor=pointer]:
                            - /url: "#B23-sensors-22-00020"
                          - text: "]. In the HCI, the user’s activity includes the following aspects ["
                          - link "24" [ref=e286] [cursor=pointer]:
                            - /url: "#B24-sensors-22-00020"
                          - text: "]: (1) physical, which determines the mechanics of the interaction between human and computer; (2) cognitive, which deals with the way that users can understand the system and interact with it; and (3) affective, which tries to make the interaction pleasurable to the user as well as to affect the user in a way that makes the user continue to use the machine by changing attitudes and emotions."
                        - generic [ref=e287]:
                          - text: "HCI is a two-way communication: (1) computer to user, and (2) user to computer. In computer to user communication, the main challenge is how to present the information efficiently. Modern UIs with innovative interface technology (e.g., virtual reality, 3D displays, etc.) have enabled new ways of information delivery to the user. A virtual agent or avatar that can mimic human behavior is another example of innovative solutions for delivering information to users. In the user to computer communication, the main challenge is enabling the user to command the computer to do things naturally. By combining human-centered design with leading-edge technologies, UIs move from keyboards, mouses, and touchscreens to IUIs that use different modalities for computer commands, including voice recognition, computer vision, and others. Novel HCII systems equipped with AI methods and techniques can respond to verbal commands (e.g., speech-based systems, such as Alexa from Amazon ["
                          - link "25" [ref=e288] [cursor=pointer]:
                            - /url: "#B25-sensors-22-00020"
                          - text: "]), and non-verbal commands (e.g., Soli from Google ["
                          - link "26" [ref=e289] [cursor=pointer]:
                            - /url: "#B26-sensors-22-00020"
                          - text: "])."
                        - generic [ref=e290]:
                          - link "Figure 1" [ref=e291] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f001"
                          - text: presents an example of a multimodal HCII system architecture that provides multimodal input/output capabilities for intelligent interaction with the user. HCII systems support multimodal input/output capabilities that, compared to standard HCI systems based on a keyboard and a mouse, provide more flexible and expressively powerful interaction with a computer. The HCII system usually provides a multimodal input enabling user input and processing of two or more modalities (e.g., touch, gaze, body movement, virtual keyboard, etc.). The user input can be based on standard simple-input input devices (e.g., keyboard, mouse, touch, etc.), recognition-based technologies (e.g., speech, gesture, emotion, etc.), or sensor-based technologies (e.g., acceleration, pressure, brain signal, etc.) [
                          - link "1" [ref=e292] [cursor=pointer]:
                            - /url: "#B1-sensors-22-00020"
                          - text: "]. HCII systems also support multimodal or multimedia output involving two or more types of information received as feedback by a user during HCI. Multimedia output can provide different media types within one modality, such as vision (e.g., still images, virtual reality, video images, etc.) or multimodal output, such as visual, auditory, and tactile feedback to the user ["
                          - link "1" [ref=e293] [cursor=pointer]:
                            - /url: "#B1-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e294]:
                          - generic [ref=e296] [cursor=pointer]:
                            - img "Sensors 22 00020 g001" [ref=e297]
                            - link [ref=e298]:
                              - /url: "#fig_body_display_sensors-22-00020-f001"
                          - generic [ref=e299]:
                            - text: Figure 1. A general architecture of a multimodal HCII system (adapted from [
                            - link "6" [ref=e300] [cursor=pointer]:
                              - /url: "#B6-sensors-22-00020"
                            - text: "])."
                        - generic [ref=e301]:
                          - text: In the last decade, there has been a rapid increase in existing literature in the HCII field. HCII aims to provide natural ways for humans to use computers and technology in all aspects of future peoples’ life and is relevant in applications, such as smart homes, smart offices, virtual reality, education, and call centers [
                          - link "27" [ref=e302] [cursor=pointer]:
                            - /url: "#B27-sensors-22-00020"
                          - text: ","
                          - link "28" [ref=e303] [cursor=pointer]:
                            - /url: "#B28-sensors-22-00020"
                          - text: "]. For an effective HCII, computers must have the communication skills of humans ["
                          - link "29" [ref=e304] [cursor=pointer]:
                            - /url: "#B29-sensors-22-00020"
                          - text: "] to be able to interact with the users naturally ["
                          - link "30" [ref=e305] [cursor=pointer]:
                            - /url: "#B30-sensors-22-00020"
                          - text: "] by enabling interactions that are able to mimic human–human interactions ["
                          - link "27" [ref=e306] [cursor=pointer]:
                            - /url: "#B27-sensors-22-00020"
                          - text: "]. HCII solutions must implement at least some kind of intelligence in perception from and/or in response to the users ["
                          - link "24" [ref=e307] [cursor=pointer]:
                            - /url: "#B24-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e308]:
                          - text: A natural human–human interaction consists of a mix of verbal signals (e.g., speech, intonation, etc.) and non-verbal signals (e.g., gestures, facial expression, eye motions, body language, etc.). Nonverbal information can be used for predicting and understanding a user’s inner (cognitive and affective) state of the mind [
                          - link "31" [ref=e309] [cursor=pointer]:
                            - /url: "#B31-sensors-22-00020"
                          - text: "]. In order to provide genuinely intuitive communication, computers need to have their sense of verbal and non-verbal signals in order to understand the message and the context of the message ["
                          - link "32" [ref=e310] [cursor=pointer]:
                            - /url: "#B32-sensors-22-00020"
                          - text: "]. A robust, efficient, and effective HCII system must therefore be able to activate different channels (e.g., auditory channels which carry speech and vocal intonation, a visual channel that carries facial expression and gestures, etc.) and modalities (e.g., sense of sight, hearing, etc.) that enable effective detection, recognition, interpretation, and analysis of various human physiological and behavioral characteristics during the interaction ["
                          - link "33" [ref=e311] [cursor=pointer]:
                            - /url: "#B33-sensors-22-00020"
                          - text: ","
                          - link "34" [ref=e312] [cursor=pointer]:
                            - /url: "#B34-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e313]:
                          - text: The research and developments in both hardware and software have enabled the use of speech, gestures, body posture, different tracking technology, tactile/force feedback devices, eye-gaze, and biosensors to develop new generations of HCI systems and application [
                          - link "33" [ref=e314] [cursor=pointer]:
                            - /url: "#B33-sensors-22-00020"
                          - text: "]. HCI systems that use only one type of input/output or modality enabling the HCI are called unimodal systems. Multimodal HCI systems, on the other hand, use many input or output modalities to communicate with the user, exhibiting some form of intelligent behavior in a particular domain ["
                          - link "24" [ref=e315] [cursor=pointer]:
                            - /url: "#B24-sensors-22-00020"
                          - text: ","
                          - link "33" [ref=e316] [cursor=pointer]:
                            - /url: "#B33-sensors-22-00020"
                          - text: "]. Based on the way of information transfer from user to the computer, UIs can be divided into ["
                          - link "35" [ref=e317] [cursor=pointer]:
                            - /url: "#B35-sensors-22-00020"
                          - text: "]: (1) contact-based interfaces (e.g., keyboard and mouse based interfaces, touch screen interfaces, etc.), (2) speech-based interfaces (e.g., spontaneous speech, continuous speech, acoustic nonspeech sounds, etc.), (3) gesture-based interfaces (e.g., finger pointing, spatial hand gestures, sign language, head gestures, user behavior, etc.), (4) facial expression-based interfaces (e.g., facial expressions, including those reflecting emotions, articulation of lips, gaze direction, eye winking, etc.), (5) textual and hand-writing interfaces (e.g., handwritten continuous text, typed text, etc.), (6) tactile and myo interfaces (e.g., sensor gloves and body-worn sensors, EMG sensors, etc.), and (7) neural computer interfaces (e.g., EEG signal, evoked potential, etc.)."
                        - generic [ref=e318]:
                          - text: Based on the nature of the modalities used, the HCIs can be divided into (1) visual-based HCI, which use various visual information about human’s response while interacting with the machine, (2) audio-based HCI that use information acquired by different audio signals, and (3) sensor-based HCI that combine a variety of areas with at least one physical sensor used between user and machine to provide the interaction [
                          - link "24" [ref=e319] [cursor=pointer]:
                            - /url: "#B24-sensors-22-00020"
                          - text: "]. The visual-based HCI research deals with the development of solutions for an efficient understanding of various humans’ responses from visual signals, including facial expression recognition, gesture recognition, gaze detection, and other areas. The audio-based HCI research includes speech recognition, speaker recognition, audio-based emotion recognition, and others. In sensor-based HCI, the solutions are being built using various sensors, which can be very primitive (e.g., a pen, a mouse, etc.) or sophisticated (e.g., motion-tracking sensors, EMG sensors, EEG devices, etc.)."
                        - generic [ref=e320]:
                          - text: Application fields of HCII are heterogeneous, and the creation of intelligent user interfaces aim to [
                          - link "36" [ref=e321] [cursor=pointer]:
                            - /url: "#B36-sensors-22-00020"
                          - text: "]: (1) change the way information is displayed based on users’ habits in a particular operating environment, (2) improve human–computer interaction by processing natural language, (3) enabling HCI for users with limitations to interact with technological devices (e.g., improvement of accessibility of interfaces for blind users, using different sensors for acquiring data about user movements and translation of movements into commands sent to a wheelchair, interfaces for cognitive impaired users, etc.). More natural and efficient intelligent interaction paradigms, such as gesture interaction, voice interaction, and face recognition, are widely being implemented in new HCI applications (e.g., smart home solutions, autonomous cars, etc.) ["
                          - link "37" [ref=e322] [cursor=pointer]:
                            - /url: "#B37-sensors-22-00020"
                          - text: "]. In contrast to the conventional mechanisms of passive manipulation, HCII integrates versatile tools, such as perceptual recognition, AI, affective computing, and emotion cognition, to enhance the ways humans interact with computers ["
                          - link "38" [ref=e323] [cursor=pointer]:
                            - /url: "#B38-sensors-22-00020"
                          - text: ","
                          - link "39" [ref=e324] [cursor=pointer]:
                            - /url: "#B39-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e325]:
                          - text: Novel IUIs are not necessarily being built for replacing traditional interfaces that use input devices, such as a mouse and a keyboard, but are, rather, complementing when needed or appropriate. Solutions that enable users using speech and hand gestures to control the computer are useful especially in virtual environments, because, for example, in a 3D environment a keyboard and a mouse as an input device are not much useful. Speech recognition solutions that can recognize speech through visual signal (e.g., reading from lips) can complement speech recognition from audio signals in noisy environments where the recognition from audio signal cannot perform well. Intelligent HCI systems can also be used for enabling efficient human-to-human interaction when this is not possible due to the limitations of end-users. For example, an intelligent HCI system that combines AI with wearable devices (e.g., data gloves) can solve communication problems between a hard-of-hearing and a non-disabled person [
                          - link "40" [ref=e326] [cursor=pointer]:
                            - /url: "#B40-sensors-22-00020"
                          - text: "]. Mobile IUI solutions today make use of the plethora of advanced sensors available in smartphones, such as camera, microphone, keyboard, touchscreen, depth sensors, accelerometer, gyroscope, geolocation sensor, barometer, compass, ambient light sensor, proximity sensor, etc., which allow the combination of inputs and enrichment of HCII interactions ["
                          - link "21" [ref=e327] [cursor=pointer]:
                            - /url: "#B21-sensors-22-00020"
                          - text: "]"
                        - generic [ref=e328]:
                          - text: As discussed above, the essential functions of HCII are based on a clear signal of emotional state to infer a person’s emotional state [
                          - link "30" [ref=e329] [cursor=pointer]:
                            - /url: "#B30-sensors-22-00020"
                          - text: "]. Emotions are complex processes comprised of numerous components, including feelings, body changes, cognitive reactions, behavior, and thoughts ["
                          - link "41" [ref=e330] [cursor=pointer]:
                            - /url: "#B41-sensors-22-00020"
                          - text: "]. Emotion is a psycho-physiological process triggered by the conscious and unconscious perception of a situation or an object and is often associated with mood, temperament, personality, disposition, and motivation ["
                          - link "42" [ref=e331] [cursor=pointer]:
                            - /url: "#B42-sensors-22-00020"
                          - text: "]. Intelligent systems providing HCII must, for example, through emotion recognition, be able to perceive the user’s emotions, produce the ability of empathy, and respond appropriately ["
                          - link "30" [ref=e332] [cursor=pointer]:
                            - /url: "#B30-sensors-22-00020"
                          - text: ","
                          - link "43" [ref=e333] [cursor=pointer]:
                            - /url: "#B43-sensors-22-00020"
                          - text: "]. By understanding emotions in natural interactions, HCII systems can make smarter decisions and provide better interactive experiences ["
                          - link "28" [ref=e334] [cursor=pointer]:
                            - /url: "#B28-sensors-22-00020"
                          - text: "]. Emotional interaction makes the human–computer interaction more intelligent—it makes the interaction natural, cordial, vivid, emotional ["
                          - link "43" [ref=e335] [cursor=pointer]:
                            - /url: "#B43-sensors-22-00020"
                          - text: "]. Because automatic emotion recognition has many applications also in HCII, it has attracted the recent hype of AI-empowered HCI research ["
                          - link "44" [ref=e336] [cursor=pointer]:
                            - /url: "#B44-sensors-22-00020"
                          - text: "]. Another essential and challenging task related to emotion recognition in HCII is speech emotion recognition ["
                          - link "45" [ref=e337] [cursor=pointer]:
                            - /url: "#B45-sensors-22-00020"
                          - text: "], which has become the heart of most HCI applications in the modern world ["
                          - link "46" [ref=e338] [cursor=pointer]:
                            - /url: "#B46-sensors-22-00020"
                          - text: "]. For many years, eye-tracking technology has been used for usability testing and implementation of various solutions for controlling the user interface. Eye-tracking-based UIs are, for example, various assistive technology solutions for people with severe disabilities (e.g., ["
                          - link "47" [ref=e339] [cursor=pointer]:
                            - /url: "#B47-sensors-22-00020"
                          - text: "]) that cannot use arms and standard input devices. However, eye-based cues (e.g., eye gaze) are another field of increasing interest to the research community for automatic emotion classification and affect prediction ["
                          - link "48" [ref=e340] [cursor=pointer]:
                            - /url: "#B48-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e341]:
                          - text: Facial expression is a powerful, natural, and direct way humans communicate and understand each other’s affective states and intentions [
                          - link "29" [ref=e342] [cursor=pointer]:
                            - /url: "#B29-sensors-22-00020"
                          - text: "]. Facial expression is considered a significant gesture of social interaction and one of the most significant nonverbal behaviors, through which HCI systems may recognize human emotions’ internal or affective state ["
                          - link "49" [ref=e343] [cursor=pointer]:
                            - /url: "#B49-sensors-22-00020"
                          - text: "]. The clues for understanding facial expressions lie not in global facial appearance but also in informative local dynamics among different but confusing expressions ["
                          - link "38" [ref=e344] [cursor=pointer]:
                            - /url: "#B38-sensors-22-00020"
                          - text: "]. Automatic facial expression recognition plays a vital role in HCII, as it can help non-intrusively apprehend a person’s psychopathology ["
                          - link "50" [ref=e345] [cursor=pointer]:
                            - /url: "#B50-sensors-22-00020"
                          - text: "]. Motivated by this significant characteristic of instantly conveying nonverbal communication, facial expression recognition plays an intrinsic role in developing the HCII and social computing fields ["
                          - link "51" [ref=e346] [cursor=pointer]:
                            - /url: "#B51-sensors-22-00020"
                          - text: "] and is becoming a necessary condition for HCII ["
                          - link "50" [ref=e347] [cursor=pointer]:
                            - /url: "#B50-sensors-22-00020"
                          - text: "]. With many applications in day-to-day developments and other areas, such as interactive video, virtual reality, videoconferencing, user profiling, games, intelligent automobile systems, entertainment industries, etc., facial expression has an essential role in HCII ["
                          - link "52" [ref=e348] [cursor=pointer]:
                            - /url: "#B52-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e349]:
                          - text: Human gesture recognition has also become a pillar of today’s HCII, as it typically provides more comfortable and ubiquitous interaction [
                          - link "2" [ref=e350] [cursor=pointer]:
                            - /url: "#B2-sensors-22-00020"
                          - text: "]. Human gestures include static postures (e.g., hand posture, head pose, and body posture) and dynamic gestures (e.g., hand gestures, head gestures like shaking and nodding, facial action like raising the eyebrows, and body gestures) ["
                          - link "53" [ref=e351] [cursor=pointer]:
                            - /url: "#B53-sensors-22-00020"
                          - text: "]. Hand gestures, for example, have been widely acknowledged as a promising HCI method ["
                          - link "54" [ref=e352] [cursor=pointer]:
                            - /url: "#B54-sensors-22-00020"
                          - text: "]. Information about head gestures obtained from head motion is valuable in various applications, such as autonomous driving solutions or assistive tools for disabled users ["
                          - link "55" [ref=e353] [cursor=pointer]:
                            - /url: "#B55-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e354]:
                          - text: Furthermore, in existing research various data sources, sensors, and advanced AI methods and algorithms for innovative solutions for HCII systems have been proposed, such as the user’s activity recognition (e.g., [
                          - link "56" [ref=e355] [cursor=pointer]:
                            - /url: "#B56-sensors-22-00020"
                          - text: ","
                          - link "57" [ref=e356] [cursor=pointer]:
                            - /url: "#B57-sensors-22-00020"
                          - text: "]), depression recognition (e.g., ["
                          - link "58" [ref=e357] [cursor=pointer]:
                            - /url: "#B58-sensors-22-00020"
                          - text: ","
                          - link "59" [ref=e358] [cursor=pointer]:
                            - /url: "#B59-sensors-22-00020"
                          - text: ","
                          - link "60" [ref=e359] [cursor=pointer]:
                            - /url: "#B60-sensors-22-00020"
                          - text: ","
                          - link "61" [ref=e360] [cursor=pointer]:
                            - /url: "#B61-sensors-22-00020"
                          - text: "]), affection recognition (e.g., ["
                          - link "62" [ref=e361] [cursor=pointer]:
                            - /url: "#B62-sensors-22-00020"
                          - text: "]), speech recognition (e.g., ["
                          - link "63" [ref=e362] [cursor=pointer]:
                            - /url: "#B63-sensors-22-00020"
                          - text: "]), user’s intention recognition (e.g., ["
                          - link "64" [ref=e363] [cursor=pointer]:
                            - /url: "#B64-sensors-22-00020"
                          - text: ","
                          - link "65" [ref=e364] [cursor=pointer]:
                            - /url: "#B65-sensors-22-00020"
                          - text: "]), and others."
                      - generic [ref=e365]:
                        - heading "2.2. Sensors Technology for HCII" [level=3] [ref=e366]
                        - generic [ref=e367]:
                          - text: As stated in the previous section, the user input can be based on standard input devices, recognition-based technologies, or sensor-based technologies. Recognition-based technologies can be implemented using invasive methods and non-invasive methods. Invasive recognition-based technologies use sensors attached to a person (e.g., accelerometer sensor attached to the chest, waist, or different body parts). In contrast, non-invasive recognition-based technologies use non-attached sensors, e.g., vision-based sensors, such as a camera, thermal infrared sensor, depth sensor, smart vision sensor, etc. [
                          - link "66" [ref=e368] [cursor=pointer]:
                            - /url: "#B66-sensors-22-00020"
                          - text: "]. Sensor-based HCI technologies are built using various sensors, which can be very primitive (e.g., a pen, a mouse, etc.) or very sophisticated (e.g., motion tracking sensors, EMG sensors, EEG sensors, etc.)."
                        - generic [ref=e369]:
                          - text: HCI devices with sensor capabilities can be divided into [
                          - link "67" [ref=e370] [cursor=pointer]:
                            - /url: "#B67-sensors-22-00020"
                          - text: "]: standard input/output devices (e.g., mouse, keyboard, touch screen, etc.), wearables (e.g., smartwatch, smartphone, band, glove, smart glasses, etc.), non-wearables (e.g., camera, microphone, environmental sensors, etc.). Wearable devices with different kinds of built-in sensors (mechanical, physiological, bioimpedance, and biochemical) can provide data about the physical and mental state of the user ["
                          - link "68" [ref=e371] [cursor=pointer]:
                            - /url: "#B68-sensors-22-00020"
                          - text: "]. Wearable sensors, for example, are increasingly being used for measuring, in particular, biological signals, such as heart rate or skin conductance ["
                          - link "69" [ref=e372] [cursor=pointer]:
                            - /url: "#B69-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e373]:
                          - text: Sensors can be divided into unimodal sensors, providing data about one single signal (e.g., accelerometer), and multimodal sensors (e.g., Body Area Sensor Network [
                          - link "70" [ref=e374] [cursor=pointer]:
                            - /url: "#B70-sensors-22-00020"
                          - text: "], Kinect, RespiBAN ["
                          - link "71" [ref=e375] [cursor=pointer]:
                            - /url: "#B71-sensors-22-00020"
                          - text: "], Empatica E4 ["
                          - link "71" [ref=e376] [cursor=pointer]:
                            - /url: "#B71-sensors-22-00020"
                          - text: "], etc.). An accelerometer sensor is a device that captures vibrations and orientation of systems that move or rotate. The accelerometer sensor has been used to study activity recognition and physical exercise trackings, such as aerobic exercises ["
                          - link "72" [ref=e377] [cursor=pointer]:
                            - /url: "#B72-sensors-22-00020"
                          - text: "], gesture recognition ["
                          - link "53" [ref=e378] [cursor=pointer]:
                            - /url: "#B53-sensors-22-00020"
                          - text: "], human activity recognition ["
                          - link "73" [ref=e379] [cursor=pointer]:
                            - /url: "#B73-sensors-22-00020"
                          - text: "], and others. The Kinect sensor consists of an RGB camera, a depth sensor, an infrared sensor, and a microphone array. The depth sensor measures the three-dimensional positions of objects in its space ["
                          - link "72" [ref=e380] [cursor=pointer]:
                            - /url: "#B72-sensors-22-00020"
                          - text: "]. Sensory used for activity recognition are typically classified as ambient and wearable sensors, where ambient sensors are attached to objects in the environment with which users interact ["
                          - link "74" [ref=e381] [cursor=pointer]:
                            - /url: "#B74-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e382]:
                          - text: With the development of AI, new types of sensors and interactive devices emerged, enabling new ways for interaction, such as biometrics-based interaction that includes face recognition, fingerprint recognition, attitude recognition, and so on [
                          - link "37" [ref=e383] [cursor=pointer]:
                            - /url: "#B37-sensors-22-00020"
                          - text: "]. It is sometimes argued that facial expression and tone of voice are also biological signals ["
                          - link "69" [ref=e384] [cursor=pointer]:
                            - /url: "#B69-sensors-22-00020"
                          - text: "]. Multimodal HCII systems usually enable technologies for processing active input mode with recognition-based and sensor-based input technologies and technologies for processing passive input using data from sensors (e.g., biosensors, ambient sensors, etc.) ["
                          - link "5" [ref=e385] [cursor=pointer]:
                            - /url: "#B5-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e386]:
