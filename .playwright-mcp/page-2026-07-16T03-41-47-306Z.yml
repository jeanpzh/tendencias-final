                          - text: Research type classification per publication year is visualized in
                          - link "Figure 8" [ref=e679] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f008"
                          - text: . As illustrated, the vast majority (91.5%) of the observed primary studies were categorized as validation research. Further 5.7% of included studies were categorized as evaluation research proposals, and 2.8% were solution proposals. The results indicate a strong trend of researchers in the HCII and IUI field publishing finalized ideas and solutions.
