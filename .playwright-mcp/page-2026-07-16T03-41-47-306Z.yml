                        - generic [ref=e432]:
                          - text: In HCII literature, several solutions for stress recognition were proposed by processing data from various sensors. The physiological response reflects the sympathetic nervous system that can be measured by an ECG sensor, a respiration band sensor, and electrodermal activity (EDA) sensor [
                          - link "79" [ref=e433] [cursor=pointer]:
                            - /url: "#B79-sensors-22-00020"
                          - text: "]. In ["
                          - link "100" [ref=e434] [cursor=pointer]:
                            - /url: "#B100-sensors-22-00020"
                          - text: "] the authors proposed a solution for stress recognition based on keystroke dynamics. Several stress-recognition solutions have combined multi sensors, e.g., visual images from a laptop camera and speech from a laptop microphone ["
                          - link "91" [ref=e435] [cursor=pointer]:
                            - /url: "#B91-sensors-22-00020"
                          - text: "], a wrist sensor (accelerometer and skin conductance sensor) ["
                          - link "101" [ref=e436] [cursor=pointer]:
                            - /url: "#B101-sensors-22-00020"
                          - text: "], multimodal wearable sensor (EEG, camera, GPS) ["
