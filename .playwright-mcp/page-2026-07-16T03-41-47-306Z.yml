                      - heading "4. Results" [level=2] [ref=e613]
                      - generic [ref=e614]: This section presents the results obtained from the analysis of the 454 primary studies. The objective of this study was to identify and systematically map the research in the field of HCII and IUI.
                      - generic [ref=e615]:
                        - heading "4.1. Trends and Demographics of the Literature within the Field of HCII" [level=3] [ref=e616]
                        - generic [ref=e617]:
                          - text: As illustrated in
                          - link "Figure 5" [ref=e618] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f005"
                          - text: ", the number of studies has been increasing in the last decade. The number of primary studies has slightly decreased in 2014 and 2016. Otherwise, a clear trend of increased interest in observed fields can be reported. Along with the increasing number of primary studies in recent years, we also noticed the change in the article types; a positive trend in the number of journal papers compared to other primary research types can be observed since 2017. The data for 2021 is incomplete as the data search was concluded in October 2021. As shown in"
                          - link "Figure 6" [ref=e619] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f006"
                          - text: ", a majority (72%) of the HCII and IUI articles have been published in conference proceedings or as book sections."
