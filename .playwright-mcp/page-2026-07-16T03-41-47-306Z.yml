                        - generic [ref=e632]:
                          - text: We ranked the journals and conferences by the number of primary articles published to get a broader view of top venues for the HCII and IUI literature. Results presented in
                          - link "Table 6" [ref=e633] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t006"
                          - text: indicate that HCII and IUI research articles could be found in a broad spectrum of journals. Most primary studies have been published in IEEE Access (21), followed by Multimedia Tools and Applications (9), Expert Systems with Applications (6), IEEE Transactions on Affective Computing (5), and Procedia Computer Science (5). The conference with the highest number of proceedings papers on HCII and IUI topics is the International Conference on Affective Computing and Intelligent Interaction (ACII), where 16% of the observed proceeding papers were published. A further 24 proceedings papers were published in Humaine Association Conference on Affective Computing and Intelligent Interaction, and further 15 were published in the Asian Conference on Affective Computing and Intelligent Interaction (ACII Asia).
