                          - text: addresses RQ3.1 and RQ3.3, showing the distribution of primary studies based on intelligent recognition’s aim and used sensor type. Half of the observed studies (52%) used sensors to obtain the data. The most widely used sensor types in the observed primary research were camera (48 studies), EEG sensor (37 studies), and Kinect (used in 30 studies), followed by wearable sensors (23 studies), eye tracker (22 studies), and multisensor (21 studies). Obtained data was in most cases used for the recognition of emotion (54 studies) and gesture recognition (54 studies). We can observe some research possibilities in using biometric/body sensors as data sources. They were only used in five studies (2% of all observed studies used sensors to obtain data). Seldom use of touch-frame/touch screen sensors (six studies) for data gathering was also surprising due to their affordability and overall widespread use. Some combinations of observed sensors and recognition solutions in
