                          - text: lists the top-cited primary studies in HCII and IUI identified and analyzed in this systematic mapping study. Our sample’s most cited primary research was the journal article “Analysis of EEG Signals” and “Facial Expressions for Continuous Emotion Detection” [
                          - link "129" [ref=e642] [cursor=pointer]:
                            - /url: "#B129-sensors-22-00020"
                          - text: "], with 219 citations. Further analysis demonstrated that the five most cited articles focused on emotion or stress recognition from different data sources (EEG signals, wearable sensors, audio, or smartphones). In the last decade, the mean number of citations for observed studies in the HCII and IUI research fields was 8.7. On average, observed conference proceedings papers in our sample were cited 6.1 times, book chapters were cited 11.5 times, while observed journal papers on average have 15.1 citations. Out of the ten top-cited studies, most (N = 7) were journal papers, while the other three were conference proceedings."
                        - generic [ref=e643]:
