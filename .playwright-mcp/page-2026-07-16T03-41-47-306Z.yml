                      - generic [ref=e668]:
                        - heading "4.2. The Research Space of the Literature within the Field of HCII in the Last Decade" [level=3] [ref=e669]
                        - generic [ref=e670]:
                          - text: To address the RQ2.1, we categorized the primary literature by the type of research as quantitative, qualitative, or mixed. Qualitative research is broadly accepted in the HCI and IUI field, as the research goal can be focused on understanding the subjectivity, not measuring and manipulating the objective data. Nevertheless, as shown in
                          - link "Figure 7" [ref=e671] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f007"
                          - text: ", most of the analyzed research (72% of studies) from HCII and IUI fields is quantitative. Qualitative and mixed research is used less often, in 16% and 11% of analyzed papers, respectively. The trend of prevailing quantitative research type is consistent over the years, with most of the primary research being quantitative in all of the observed years in the last decade. However, we noticed a slight increase in studies using mixed research types in recent years."
