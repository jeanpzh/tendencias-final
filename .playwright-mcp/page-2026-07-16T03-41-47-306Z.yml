                      - generic [ref=e554]:
                        - heading "3.1. Definition of Research Questions" [level=3] [ref=e555]
                        - generic [ref=e556]:
                          - text: The primary goal of this study is to identify, analyze, and synthesize existing work in the HCII field. The main objective of this study is to (1) systematically review relevant scientific articles to conduct a SMS of the HCII area and (2) to present trends and demographic analysis of the HCII research field. Based on the research goal, we formulated three main research questions—RQ1, RQ2, and RQ3. As the main questions are too general, a set of sub-research questions for all were proposed to provide more complete answers to the formulated research questions, as presented in
                          - link "Table 1" [ref=e557] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t001"
                          - text: .
                        - generic [ref=e558]:
                          - generic [ref=e559]: Table 1. Research questions.
                          - generic [ref=e561] [cursor=pointer]:
                            - img [ref=e562]
                            - link [ref=e563]:
                              - /url: "#table_body_display_sensors-22-00020-t001"
                      - generic [ref=e564]:
                        - heading "3.2. Conducting Search and Screening" [level=3] [ref=e565]
                        - generic [ref=e566]: "After identifying the research questions, we defined the appropriate keywords for finding all published articles with topics from HCII and IUI. As we wanted to provide a comprehensive overview of the research area, broad keywords were used. The elementary search query string used for finding published articles was the following:"
                        - blockquote [ref=e567]:
                          - generic [ref=e568]: “intelligent interaction” OR “intelligent user interface”.
                        - generic [ref=e569]:
                          - text: "For finding the relevant literature, we used the following publicly established available digital libraries: ACM, IEEE, ScienceDirect, Scopus, and Web of Science. The first search, conducted using the digital libraries, yielded 5642 articles (see"
                          - link "Table 2" [ref=e570] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t002"
                          - text: ) that were used as inputs into the next selection process step. Several inclusion and exclusion criteria were applied (see the criteria specification in
                          - link "Table 3" [ref=e571] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t003"
                          - text: ).
                        - generic [ref=e572]:
                          - generic [ref=e573]: Table 2. Articles retrieved from the selected digital libraries using the specified search string.
                          - generic [ref=e575] [cursor=pointer]:
                            - img [ref=e576]
                            - link [ref=e577]:
                              - /url: "#table_body_display_sensors-22-00020-t002"
                        - generic [ref=e578]:
                          - generic [ref=e579]: Table 3. Inclusion and exclusion criteria.
                          - generic [ref=e581] [cursor=pointer]:
                            - img [ref=e582]
                            - link [ref=e583]:
                              - /url: "#table_body_display_sensors-22-00020-t003"
                        - generic [ref=e584]:
                          - text: The process of selecting the relevant literature was carried out in several steps (see
                          - link "Table 4" [ref=e585] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t004"
                          - text: and
                          - link "Figure 4" [ref=e586] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f004"
                          - text: ). In the second step, we have limited the set of studies by applying the exclusion criteria E1 to include only studies published in 2010 or later, which resulted in a set of 3335 studies. The titles and abstracts were read to select studies that address intelligent interaction or intelligent user interfaces in step three. In the third step, we also excluded studies that were not published in English and were not accessible electronically. The third step provided 657 articles published in a journal, conference proceeding, or a book as a book section. In the next step, removing 35 duplicate entries resulted in 622 articles used for the last step of the selection process. In the fifth step, the exclusion criteria E3–E7 were applied to exclude studies unrelated to computer science and HCI research areas. In addition, literate reviews or systemic mapping studies were excluded. Short papers with less than four pages and articles not written in English were not selected for the final analysis. Although the language criteria were already applied in step three, some articles we found had titles and abstracts written English; however, the rest of the article was not written in English. The last screening step resulted in 454 articles that were used for the systematic mapping study.
