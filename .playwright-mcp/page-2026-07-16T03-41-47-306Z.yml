                        - generic [ref=e660]:
                          - text: To get a broader view of the contributors in the research field, who scientifically promote HCII and IUI topics, we have observed the country of the author’s affiliation. As shown in
                          - link "Table 9" [ref=e661] [cursor=pointer]:
