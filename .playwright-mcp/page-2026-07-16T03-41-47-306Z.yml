                        - generic [ref=e649]:
                          - text: Analyzing the impact of a specific study in the existing literature, only from the point of view of the number of all citations, may not be the best, especially if we want to compare studies that have been published ten years apart. Articles published several years ago have probably had a greater chance of being recognized and cited by other authors. Moreover, for studies that have been conducted and published recently, there may not have been enough time for them to be already recognized and cited in the existing literature by other authors. Therefore, to provide an additional view on the most influential research in HCII, we ranked the studies according to the average number of paper citations per year (see
                          - link "Table 8" [ref=e650] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t008"
                          - text: "). Based on the average number of citations per year, this time, the study EmotionMeter: A Multimodal Framework for Recognizing Human Emotions ["
                          - link "112" [ref=e651] [cursor=pointer]:
                            - /url: "#B112-sensors-22-00020"
                          - text: "], performed best with 62,67 citations on average per year. The second best ranked was the study Analysis of EEG Signals and Facial Expressions for Continuous Emotion Detection ["
                          - link "129" [ref=e652] [cursor=pointer]:
                            - /url: "#B129-sensors-22-00020"
                          - text: "], with 36.5 citations per year. The study ranked third was Deep learning analysis of mobile physiological, environmental, and location sensor data for emotion detection ["
                          - link "131" [ref=e653] [cursor=pointer]:
                            - /url: "#B131-sensors-22-00020"
                          - text: "], with 34 citations per year on average."
