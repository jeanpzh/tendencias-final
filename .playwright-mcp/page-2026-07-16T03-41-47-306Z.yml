                      - generic [ref=e599]:
                        - heading "3.3. Classification and Data Extraction" [level=3] [ref=e600]
                        - generic [ref=e601]:
                          - text: To ensure that all studies would be analyzed consistently, rules about coding data about study characteristics and the results were specified. A predefined classification scheme is summarized in the
                          - link "Table 5" [ref=e602] [cursor=pointer]:
                            - /url: "#table_body_display_sensors-22-00020-t005"
                          - text: . Firstly, we noted the article type (EC1) as a journal article, conference paper, or book selection. Proceedings papers were classified as conference papers. In terms of research type (EC2), a study was classified as quantitative when authors used quantitative methods for data analysis, qualitative if qualitative methods were used for data analysis, and mixed for studies where quantitative and qualitative data analysis methods were used. Research method type (EC3) was observed as suggested by [
                          - link "128" [ref=e603] [cursor=pointer]:
                            - /url: "#B128-sensors-22-00020"
                          - text: "] as validation research, evaluation research, a solution proposal, a philosophical paper, an opinions paper, or an experience paper. Validation research—a certain novel HCII method/technique/algorithm/tool, which has not yet been implemented in practice and was validated using a method-like case study, and experiments in lab, simulation, prototyping, etc. Evaluation research—a certain HCII method/technique/algorithm/tool, which was implemented and evaluated in practice. It shows how the method/technique/algorithm/tool was implemented in practice and what the benefits and drawbacks of the implementation are, evaluated using techniques, such as industrial case study, controlled experiments with practitioners, action research, etc. Solution proposal—a HCII method/technique/algorithm/tool is proposed, which can be either novel or a significant extension of an existing one. The potential benefits and the applicability of the solution is shown by a small example or a good line of argumentation. However, the proposed solution has not yet been implemented. Philosophical papers—for better understanding of existing things, a new-structured view is provided, by constructing a taxonomy or conceptual framework. Opinion papers—a personal opinion is provided of somebody, about whether a certain HCII method/technique/algorithm/tool is good or bad, or how things should be done. The opinions usually do not rely on related work and/or research methodologies. Experience papers—papers explain the author’s personal experience on what and how HCII method/technique/algorithm/tool has been done in practice. The research strategy was noted with EC4 as a case study, experiment, survey, grounded theory, user study, field study, mixed study, exploratory study, or literature review. As the IUI is a multidisciplinary filed, we noted the predominant research standpoint with EC6 as accessible UI, adaptive UI, artificial intelligence, brain computer interface (BCI), human–computer interaction (HCI), human–machine interaction (HMI), intelligent interaction (II), or intelligent UI. The research standpoint values were gathered from related literature ["
                          - link "7" [ref=e604] [cursor=pointer]:
                            - /url: "#B7-sensors-22-00020"
                          - text: "] and extended during the screening. The list of values for data source (EC10), sensor type (EC11), and AI methods used (EC12) were defined literature (one source was for example ["
                          - link "13" [ref=e605] [cursor=pointer]:
                            - /url: "#B13-sensors-22-00020"
                          - text: "]) and extended during the screening process."
                        - generic [ref=e606]:
