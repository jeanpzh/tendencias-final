                        - generic [ref=e686]:
                          - text: To further analyze how the research is conducted in the HCII and IUI studies, we noted the methodology used to validate or evaluate the proposed solutions in the primary studies. Results displayed in
                          - link "Figure 9" [ref=e687] [cursor=pointer]:
                            - /url: "#fig_body_display_sensors-22-00020-f009"
                          - text: show that the most used method in observed studies is an experiment (observed in 387 articles), followed by a case study (57 studies). Only a few user studies (N = 2), mixed studies (N = 1), and exploratory studies (N = 2) were found in our sample, all of which have been conducted in the last two years. In the last decade, five survey studies have been performed, evenly spread through the observed years.
