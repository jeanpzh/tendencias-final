                            - /url: "#B78-sensors-22-00020"
                          - text: "], a RespiBAN (chest-worn) and Empatica E4 (wrist-worn) sensor (ECG, EDA, EMG, Respiration and Temperature) ["
                          - link "71" [ref=e438] [cursor=pointer]:
                            - /url: "#B71-sensors-22-00020"
                          - text: "], webcam, Kinect, EDA, and GPS sensor ["
                          - link "102" [ref=e439] [cursor=pointer]:
                            - /url: "#B102-sensors-22-00020"
                          - text: "], BIOPAC MP150 (ECG from wrist, EMG from corrugator muscle, GSR from fingertips) and video from camera for offline analysis ["
                          - link "89" [ref=e440] [cursor=pointer]:
                            - /url: "#B89-sensors-22-00020"
                          - text: "], etc."
                        - generic [ref=e441]:
                          - text: To enhance the quality of the communication and maximize the user’s well being during his or her interaction with the computer, the machine must understand the user’s state and automatically respond intelligently. For this, various data about the user’s behavior and state related to the interaction must be collected and analyzed. For example, understanding users’ emotions can be achieved through various measures, such as subjective self-reports, face tracking, voice analysis, gaze-tracking, and the analysis of autonomic and central neurophysiological measurements [
                          - link "103" [ref=e442] [cursor=pointer]:
                            - /url: "#B103-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e443]:
                          - text: Humans’ emotional reactions during HCI can trigger physiological changes that can be recognized using various modalities such as facial expressions, facial blood flow, speech, behavior (gesture/posture), and physiological signals. In existing HCII research the behavioral modeling and recognition uses various physiological signals, including the electrocardiogram (ECG), electromyogram (EMG), electroencephalogram (EEG), galvanic skin response (GSR), blood volume pressure (BVP), heart rate (HR) or heart rate variability (HRV), temperature (T), and respiration rate (RR) [
                          - link "41" [ref=e444] [cursor=pointer]:
                            - /url: "#B41-sensors-22-00020"
                          - text: "]. The physiological signals respond to the human body’s central nervous system and automatic nervous system, which are voluntary reactions and are more objective ["
                          - link "104" [ref=e445] [cursor=pointer]:
                            - /url: "#B104-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e446]:
                          - text: Emotions, for example, can trigger some minor changes in facial blood flow with an impact on skin temperature [
                          - link "42" [ref=e447] [cursor=pointer]:
                            - /url: "#B42-sensors-22-00020"
                          - text: "] and speech ["
                          - link "105" [ref=e448] [cursor=pointer]:
                            - /url: "#B105-sensors-22-00020"
                          - text: "]. EEG-based emotion recognition, for example, has become crucial in enabling the HCII ["
                          - link "44" [ref=e449] [cursor=pointer]:
                            - /url: "#B44-sensors-22-00020"
                          - text: "] and has been globally accepted in many applications, such as intelligent thinking, decision-making, social communication, feeling detection, affective computing, etc. ["
                          - link "106" [ref=e450] [cursor=pointer]:
                            - /url: "#B106-sensors-22-00020"
                          - text: "]. Facial expression recognition can involve using sensors, such as cameras, eye-tracker, ECG, EMG, and EEG ["
                          - link "107" [ref=e451] [cursor=pointer]:
                            - /url: "#B107-sensors-22-00020"
                          - text: "]. The emotion recognition process often includes sensors for detecting physiological signals, which are not visible in the human eye and immediately reflect the emotional changes ["
                          - link "44" [ref=e452] [cursor=pointer]:
                            - /url: "#B44-sensors-22-00020"
                          - text: "]. Some of the current approaches to emotion recognition based on EEG mostly rely on various handcrafted features extracted over relatively long-time windows of EEG during the participants’ exposure to appropriate affective stimuli ["
                          - link "103" [ref=e453] [cursor=pointer]:
                            - /url: "#B103-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e454]:
                          - text: One of the main challenges in HCII is the measurement of physiological signals (or biosignals), where the collection process uses invasive sensors that need to be in contact with the human body while recording. However, the ongoing research has enabled the use of non-invasive sensors as well. For example, innovative sensors, such as eye-trackers, enable the development of IUIs able to extract valuable and usable patterns of the users’ habits and ways of interaction [
                          - link "64" [ref=e455] [cursor=pointer]:
                            - /url: "#B64-sensors-22-00020"
                          - text: "]. The non-invasive sEMG signal can be used to analyze the active state of the muscles and neural activities and performs well in artificial control, clinical diagnosis, motion detection, and neurological rehabilitation ["
                          - link "54" [ref=e456] [cursor=pointer]:
                            - /url: "#B54-sensors-22-00020"
                          - text: "]. Hand gesture recognition can be implemented by using a vision camera or wearable sensors ["
                          - link "108" [ref=e457] [cursor=pointer]:
                            - /url: "#B108-sensors-22-00020"
                          - text: "]. Wearable sensors and gesture recognition techniques have been used to develop wearable motion sensors for the hearing- and speech-impaired and wearable gesture-based gadgets for interaction with mobile devices ["
                          - link "109" [ref=e458] [cursor=pointer]:
                            - /url: "#B109-sensors-22-00020"
                          - text: "]. Recently, depth-based gesture recognition has received much intention in HCII as well ["
                          - link "110" [ref=e459] [cursor=pointer]:
                            - /url: "#B110-sensors-22-00020"
                          - text: "]. With the rapid development of IoT technologies, many intelligent sensing applications have emerged, which realize contactless sensing ["
                          - link "111" [ref=e460] [cursor=pointer]:
                            - /url: "#B111-sensors-22-00020"
                          - text: "]."
                      - generic [ref=e461]:
                        - heading "2.3. Artificial Intelligence (AI) Methods and Algorithms for HCII" [level=3] [ref=e462]
                        - generic [ref=e463]:
                          - text: Artificial Intelligence (AI) is one of the most crucial components in the development of HCII and has already significantly impacted how users use and perceive contemporary IUI. The introduction of affective factors to HCIs resulted in developing an interdisciplinary research field, often called affective computing, which attempts to develop human-aware AI that can perceive, understand, and regulate emotions [
                          - link "112" [ref=e464] [cursor=pointer]:
                            - /url: "#B112-sensors-22-00020"
                          - text: "]. Once computers understand humans’ emotions, AI will rise to a new level ["
                          - link "113" [ref=e465] [cursor=pointer]:
                            - /url: "#B113-sensors-22-00020"
                          - text: "]. In the HCSII research field, there is an increasing focus on developing emotional AI in HCI since emotion recognition using AI is a fundamental prerequisite to improve HCI ["
                          - link "106" [ref=e466] [cursor=pointer]:
                            - /url: "#B106-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e467]:
                          - text: Machine-learning (ML) algorithms and methods can be categorized according to the learning style or similarity in form or function. When categorizing based on the learning style, ML approaches can be divided to following three categories [
                          - link "114" [ref=e468] [cursor=pointer]:
                            - /url: "#B114-sensors-22-00020"
                          - text: ","
                          - link "115" [ref=e469] [cursor=pointer]:
                            - /url: "#B115-sensors-22-00020"
                          - text: "]:"
                        - list [ref=e471]:
                          - listitem [ref=e472]:
                            - generic [ref=e473]: Supervised learning (SL) algorithms including classification, support vector machine (SVM), discriminant analysis, naïve Bayes (NB), k-Nearest Neighbor—k-NN, regression, linear regression (LR), ensemble algorithms, decision trees (DT), artificial neural network (ANN), extreme machine learning (ELM), relevance vector machine (RVM), Gaussian processes (GP), combined algorithms, etc.,
                          - listitem [ref=e474]:
                            - generic [ref=e475]: Unsupervised learning (UL) algorithms that include clustering, hierarchical ML, unsupervised Gaussian mixture (UGM), hidden Markov model—HMM, K-means, fuzzy c-means, neural networks (NN), etc.,
                          - listitem [ref=e476]:
                            - generic [ref=e477]: Reinforcement learning (RL) algorithms that include model-based RL, model-free RL, and RL-based adaptive controllers.
                        - generic [ref=e478]:
                          - text: ML algorithms can also be categorized into single method-based algorithms and hybrid method-based ML algorithms [
                          - link "116" [ref=e479] [cursor=pointer]:
                            - /url: "#B116-sensors-22-00020"
                          - text: "]. Single method-based algorithms include fuzzy logic (FL), ANN (e.g., perceptron, multilayer perceptrons—MLP, etc.), deep learning algorithms (DLA) (e.g., convolutional neural network—CNN, recurrent neural networks—RNNs, long short-term memory networks—LSTMs, etc.), Bayesian network (BN), genetic algorithm (GA), kernel method (e.g., SVM), logistic regression (LoR), and DT (e.g., J-48graft, random forest—RF). Hybrid method-based algorithms on the other side include fuzzy logic and natural language processing (FL-NLP), Bayesian network and recurrent neural network, long short-term memory and neural networks (LSTM-NN), etc."
                        - generic [ref=e480]: Based on the similarity in terms of the algorithm’s’ function, ML algorithms can be divided into regression algorithms (e.g., LR, LoR, etc.), instance-based algorithms (e.g., k-NN, SVM, etc.), regularization algorithms (e.g., elastic net), decision tree algorithms (e.g., cClassification and regression tree, C4.5 and C5.0, etc.), Bayesian algorithms (e.g., NB, Gaussian NB, etc.), clustering algorithms (e.g., k-Means, k-Medians, etc.), association rule learning algorithms (e.g., Apriori algorithm), ANN algorithms (e.g., perceptron, MLP, RNN, etc.), dimensionality reduction algorithms (e.g., principal component analysis—PCA), ensemble algorithms (e.g., Adaboost), algorithms based on probabilistic models (e.g., Monte Carlo) and probabilistic graphical models (e.g., Bayesian network—BN), genetic algorithms, fuzzy logic- based algorithms, and other ML algorithms (e.g., feature selection algorithm, optimization algorithms, etc.).
                        - generic [ref=e481]:
                          - text: In existing HCII- related research, various methods and algorithms have been proposed to accomplish the task of facial expression classification, including SVM, k-NN, NN, rule-based classifiers, and BN [
                          - link "51" [ref=e482] [cursor=pointer]:
                            - /url: "#B51-sensors-22-00020"
                          - text: "]. For facial emotion recognition, for example, CNN was recognized as an effective method that can perform feature extraction and classification simultaneously and automatically discover multiple levels of representations in data ["
                          - link "50" [ref=e483] [cursor=pointer]:
                            - /url: "#B50-sensors-22-00020"
                          - text: "]. Audio-video emotion recognition, for example, is now researched and developed with deep neural network modeling tools ["
                          - link "117" [ref=e484] [cursor=pointer]:
                            - /url: "#B117-sensors-22-00020"
                          - text: "]. In the speech emotion recognition field, there is considerable attention in digital signal processing research. Researchers have developed different methods and algorithms for analyzing the emotional condition of an individual user with the focus on emotion classification by salient acoustic features of speech. Most researchers in speech emotion recognition have applied handcrafted features and machine learning techniques in recognizing speech emotion ["
                          - link "46" [ref=e485] [cursor=pointer]:
                            - /url: "#B46-sensors-22-00020"
                          - text: "]. In existing speech emotion recognition research, classical ML classifiers were used, such as the Markov model (MM), Gaussian mixed model (GMM), and SVM ["
                          - link "118" [ref=e486] [cursor=pointer]:
                            - /url: "#B118-sensors-22-00020"
                          - text: "]. Existing research has demonstrated that DLA effectively extract robust and salient features in the dataset ["
                          - link "46" [ref=e487] [cursor=pointer]:
                            - /url: "#B46-sensors-22-00020"
                          - text: "]. After the ANN breakthrough, especially CNN, the neural approach has become the main one for creating intelligent computer vision systems ["
                          - link "119" [ref=e488] [cursor=pointer]:
                            - /url: "#B119-sensors-22-00020"
                          - text: "]. CNN is currently the most widely used deep-learning model for image recognition ["
                          - link "63" [ref=e489] [cursor=pointer]:
                            - /url: "#B63-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e490]: This study is interested in AI methods and techniques for HCII solutions available in the existing literature. We are interested in both HCII solutions validated using data from sensor technology and HCII solutions validated using data from publicly available databases.
                      - generic [ref=e491]:
                        - heading "2.4. Related Studies" [level=3] [ref=e492]
                        - generic [ref=e493]: In the existing literature in HCI and HCII, several studies of systematic literature reviews (SLR) and systematic mapping studies (SMS) have been conducted in the last ten years. This fact indicates that the large body of work encouraged researchers to create a joint knowledge base in this field. Although we can find some parallels between the existing SLR and SMS studies and our study, as the existing studies also dealt with a specific topic related to HCI and HCII, certain differences make our study the first such study in HCII.
                        - generic [ref=e494]: We see the first difference when reviewing the keywords based on which existing SLR and SMS studies have systematically acquired and analyzed the existing literature. The most common keywords were HCI (in 7 studies), followed by AI (in 3 studies), IoT (in 3 studies), and EMG (in 3 studies). Others were IUI (in 2 studies), robustness (in 2 studies), accuracy (in 2 studies), smart home (in 2 studies), and deep learning (in 2 studies), followed by over 40 different keywords, particular to different domains, indicating that HCI is an important research field and is integrated into various domains. Furthermore, none of the existing studies aimed to analyze HCII and IUI literature in general and provide a standard overview of sensor technology and machine-learning methods and algorithms used for other HCII developments.
                        - generic [ref=e495]:
                          - text: In [
                          - link "9" [ref=e496] [cursor=pointer]:
                            - /url: "#B9-sensors-22-00020"
                          - text: "], authors investigated how to approach the design of human-centric IT systems and what they represent. A study published ten years later ["
                          - link "10" [ref=e497] [cursor=pointer]:
                            - /url: "#B10-sensors-22-00020"
                          - text: "], has still been questioning what is actually deemed intelligent, and surprisingly still examining the question that should have been answered a decade ago. In one of the most extensive reviews of literature related to the HCI field ["
                          - link "120" [ref=e498] [cursor=pointer]:
                            - /url: "#B120-sensors-22-00020"
                          - text: "], authors analyzed 3243 articles, examining publication growth, geographical distribution, citation analysis research productivity, and keywords, and identified the following five clusters: (1) UI for user centric design, (2) HCI, (3) interaction design, (4) intelligent interaction recognition research, and (5) e-health and health information. The main conclusion in ["
                          - link "120" [ref=e499] [cursor=pointer]:
                            - /url: "#B120-sensors-22-00020"
                          - text: "] was that the research in this field has little consistency, the researchers start addressing newer technologies, and there is no accumulated knowledge. A similar attempt at visualizing popular clusters for a specific decade was also observed in ["
                          - link "121" [ref=e500] [cursor=pointer]:
                            - /url: "#B121-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e501]:
                          - text: Regardless of how potentially unorganized research in HCI might be, the benefits of its use are evident in several other research studies. The benefits of HCI solutions are the main focus of various SLR and SMS studies (e.g., [
                          - link "11" [ref=e502] [cursor=pointer]:
                            - /url: "#B11-sensors-22-00020"
                          - text: ","
                          - link "12" [ref=e503] [cursor=pointer]:
                            - /url: "#B12-sensors-22-00020"
                          - text: ","
                          - link "122" [ref=e504] [cursor=pointer]:
                            - /url: "#B122-sensors-22-00020"
                          - text: "]). For example, the authors in ["
                          - link "12" [ref=e505] [cursor=pointer]:
                            - /url: "#B12-sensors-22-00020"
                          - text: "] investigated wearable devices, arguing that they have brought the highest level of convenience and assistance to people than ever before. The findings are supported by the study results conducted in ["
                          - link "11" [ref=e506] [cursor=pointer]:
                            - /url: "#B11-sensors-22-00020"
                          - text: "], where authors addressed the benefits of wearable devices for the aging population with chronic diseases, potentially reducing the social and economic burdens. The importance of HCI in healthcare was furthermore analyzed in ["
                          - link "13" [ref=e507] [cursor=pointer]:
                            - /url: "#B13-sensors-22-00020"
                          - text: ","
                          - link "122" [ref=e508] [cursor=pointer]:
                            - /url: "#B122-sensors-22-00020"
                          - text: "], where the research was focused on people with disabilities and related health problems. The role of AI technology for activity recognition, data processing, decision making, image recognition, prediction making, and voice recognition in smart home interactive solutions was also analyzed ["
                          - link "17" [ref=e509] [cursor=pointer]:
                            - /url: "#B17-sensors-22-00020"
                          - text: "]. Some existing SLR studies are also focused on the general use of HCI solutions, providing support in healthcare ["
                          - link "122" [ref=e510] [cursor=pointer]:
                            - /url: "#B122-sensors-22-00020"
                          - text: "], smart living ["
                          - link "17" [ref=e511] [cursor=pointer]:
                            - /url: "#B17-sensors-22-00020"
                          - text: "], or understanding human emotions from speech ["
                          - link "18" [ref=e512] [cursor=pointer]:
                            - /url: "#B18-sensors-22-00020"
                          - text: "]."
                        - generic [ref=e513]:
                          - text: The second focus of published SLR and SMS studies are sensors, signals, and the intelligent use of different devices. Authors in [
                          - link "12" [ref=e514] [cursor=pointer]:
                            - /url: "#B12-sensors-22-00020"
                          - text: "] investigated types of wearable devices for general users. At the same time, ["
                          - link "13" [ref=e515] [cursor=pointer]:
                            - /url: "#B13-sensors-22-00020"
                          - text: "] addressed the benefits of ambient-assisted living and IUI for people with special needs, concluding how important it is to design user-friendly interfaces to provide an excellent HCI mechanism that fits the needs of all users. A similar effort was made in ["
                          - link "123" [ref=e516] [cursor=pointer]:
                            - /url: "#B123-sensors-22-00020"
                          - text: "], only this time the general user population is included, indicating that several “general solutions” do not always have user-friendly interfaces. The level of intelligence is low, and they need to be improved."
                        - generic [ref=e517]:
                          - text: The importance of well-designed and well-interpreted HCII can be presented as the third focus of studies. For example, in [
                          - link "37" [ref=e518] [cursor=pointer]:
                            - /url: "#B37-sensors-22-00020"
                          - text: "], authors recognized new HCI scenarios, such as smart homes and driverless cars. In ["
                          - link "124" [ref=e519] [cursor=pointer]:
                            - /url: "#B124-sensors-22-00020"
                          - text: "], augmented reality (AR) and the third generation of AI technology are investigated. However, both studies lack a systematic review (a lower number of literature units indicate limited research space in these specific topics). The risk of misinterpretation of signals and the connecting risks are addressed in ["
                          - link "15" [ref=e520] [cursor=pointer]:
                            - /url: "#B15-sensors-22-00020"
                          - text: "] (EMG) and in ["
                          - link "16" [ref=e521] [cursor=pointer]:
                            - /url: "#B16-sensors-22-00020"
                          - text: "] (EEG), both claiming there are several issues in this area. The review of ["
                          - link "15" [ref=e522] [cursor=pointer]:
                            - /url: "#B15-sensors-22-00020"
                          - text: "] focuses on deep learning in EMG decoding, while ["
                          - link "16" [ref=e523] [cursor=pointer]:
                            - /url: "#B16-sensors-22-00020"
                          - text: "] is set to find different good practices within existing research."
                        - generic [ref=e524]:
                          - text: Benefits of IoT and HCI collaboration are addressed within the application of IoT systems, emphasizing the influence of human factors while using HCI [
                          - link "125" [ref=e525] [cursor=pointer]:
                            - /url: "#B125-sensors-22-00020"
                          - text: "]. The authors in ["
                          - link "125" [ref=e526] [cursor=pointer]:
                            - /url: "#B125-sensors-22-00020"
                          - text: "] address the advantages of information visualization, cognition, and human trust in intelligent systems. In contrast, the authors in ["
                          - link "126" [ref=e527] [cursor=pointer]:
                            - /url: "#B126-sensors-22-00020"
                          - text: "] present a unified framework for deriving and analyzing adaptive and scalable network design and resource allocation schemes for IoT."
                        - generic [ref=e528]:
                          - text: In the last decade, there was an emphasis on developing solutions for mobile devices. SLRs related to the HCII field on mobile devices are focused on mobile emotion recognition methods, primarily but not exclusively addressing smartphone devices. The authors in [
                          - link "21" [ref=e529] [cursor=pointer]:
                            - /url: "#B21-sensors-22-00020"
                          - text: "] deliver a systematic overview of publications from the past ten years addressing smartphone emotion recognition, providing a detailed presentation of 75 studies. Meyer et al. ["
                          - link "20" [ref=e530] [cursor=pointer]:
                            - /url: "#B20-sensors-22-00020"
                          - text: "] also analyzed the existing research field of mobile emotion measurement and recognition. By conducting a literature review, they were focused on optical emotion recognition or face recognition, acoustic emotion recognition or speech recognition, behavior-based emotion recognition or gesture recognition, and vital-data-based emotion recognition or biofeedback recognition. Research, conducted by Tzafilkou et al. ["
                          - link "19" [ref=e531] [cursor=pointer]:
                            - /url: "#B19-sensors-22-00020"
                          - text: "] addressed the use of non-intrusive mobile sensing methodologies for emotion recognition in smartphone devices, narrowing the timescale and number of papers even more: 30 articles during the past six years. Similar to the findings of our study, the authors identified a peak of papers published in 2016 and 2017. Based on the results that revealed main research trends and gaps in the field, the authors discussed research challenges and considerations of practical implications for the design of emotion-aware systems within the context of distance education."
                    - generic [ref=e532]:
                      - heading "3. Materials and Methods" [level=2] [ref=e533]
                      - generic [ref=e534]:
                        - text: We conducted a systematic mapping study (SMS) to identify state-of-the-art research in the HCII area and to observe trends in research and the developments in sensor technology and AI methods and algorithms for HCII. We followed the guidelines prepared by Pettersen et al. [
                        - link "127" [ref=e535] [cursor=pointer]:
                          - /url: "#B127-sensors-22-00020"
                        - text: "] (see"
                        - link "Figure 2" [ref=e536] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-22-00020-f002"
                        - text: ).
                      - generic [ref=e537]:
                        - generic [ref=e539] [cursor=pointer]:
                          - img "Sensors 22 00020 g002" [ref=e540]
                          - link [ref=e541]:
                            - /url: "#fig_body_display_sensors-22-00020-f002"
                        - generic [ref=e542]:
                          - text: Figure 2. Systematic mapping study process adapted from [
                          - link "127" [ref=e543] [cursor=pointer]:
                            - /url: "#B127-sensors-22-00020"
                          - text: "]."
                      - generic [ref=e544]:
                        - text: The research activities in this study were divided into five phases (see
                        - link "Figure 3" [ref=e545] [cursor=pointer]:
                          - /url: "#fig_body_display_sensors-22-00020-f003"
                        - text: ). In the first phase, the research questions presented in
                        - link "Section 3.1" [ref=e546] [cursor=pointer]:
                          - /url: "#sec3dot1-sensors-22-00020"
                        - text: were defined. Next, the scope of the study was reviewed with the preliminary research in the selected databases, presented in Table 2. At this point, we conducted the review of related work and created the first draft of the classification scheme based on our research questions and propositions from related work. The search was conducted following the predefined inclusion and exclusion criteria presented in Table 3. After screening the papers based on abstract in the first step and whole content screening in the next step, the relevant papers were selected, and the draft classification scheme was revised and extended. The final version of the scheme is presented in Table 5. In phase three, data from the selected papers were extracted in accordance with the finalized classification scheme. In phase four, systematic maps presented in
                        - link "Section 4" [ref=e547] [cursor=pointer]:
                          - /url: "#sec4-sensors-22-00020"
                        - text: were created, and the results were analyzed. Predefined steps for SMS were extended in our study, as we defined the draft classification scheme after reviewing the research scope. The research was concluded in phase 5 with writing activities.
                      - generic [ref=e548]:
                        - generic [ref=e550] [cursor=pointer]:
                          - img "Sensors 22 00020 g003" [ref=e551]
                          - link [ref=e552]:
